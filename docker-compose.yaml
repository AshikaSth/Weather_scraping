
x-shared: &shared
  image: weather_app_base:latest
  build: .
  working_dir: /app
  env_file:
    - .env
  environment:
    - PYTHONPATH=/app 
    - TZ=Asia/Kathmandu 
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_started

services:
  celery_worker:
    <<: *shared
    command: celery -A app.tasks:celery_app worker --loglevel=info
    volumes:
      - .:/app
  celery_beat:
    <<: *shared
    command: celery -A app.tasks:celery_app beat --loglevel=info
    volumes:
      - .:/app

  web_dashboard:
    <<: *shared
    command: python3 app/main.py
    ports:
      - "2222:5000"
    volumes:
      - .:/app

  db:
    image: mysql:8.0
    restart: always
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3330:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backup:
    image: mysql:8
    depends_on:
      - db
    volumes:
      - ./backup:/backup
    entrypoint: >
      sh -c "
      while true; do
        DATE=$$(date +%F_%H-%M-%S);
        echo 'Running backup for database: $$DATE';
        mysqldump -h db -u $$MYSQL_USER -p$$MYSQL_PASSWORD $$MYSQL_DB > /backup/backup_$$DATE.sql;
        find /backup -type f -mtime +7 -delete;
        sleep 3600;
      done
      "
    environment:
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DB: ${MYSQL_DB}

  redis:
    image: redis:alpine
    restart: always
  
volumes:
  mysql_data:

networks:
  app_network:


